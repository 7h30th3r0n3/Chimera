name: Feature Request
description: Suggest a new workflow, model routing strategy, or integration
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Chimera!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New example workflow
        - Model routing improvement
        - New AI tool integration (Gemini, Copilot, etc.)
        - Rule improvement
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Describe the scenario where this would be useful
